name: Build WebdriverIO

on:
  workflow_call:
  # Make this a reusable workflow, no value needed
  # https://docs.github.com/en/actions/using-workflows/reusing-workflows

jobs:
  build:
    permissions:
      contents: read
      packages: read
    # Workaround while waiting for 24.04 to be fixed with node 24.16 & puppeteer hanging on unzipping
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: 🧑‍🔧 Get Core Dependencies
        uses: ./.github/workflows/actions/get-core-dependencies

      - name: 👷 Bootstrap Packages
        run: pnpm run setup
        shell: bash
        env:
          NODE_ENV: production
          GITHUB_AUTH: ${{ secrets.GITHUB_TOKEN }}

      - name: ⬆️ Upload Build Artifacts
        uses: ./.github/workflows/actions/upload-archive
        with:
          name: webdriverio
          output: webdriverio-build.zip
          paths: packages/*/build packages/*/cjs
