name: Unit Tests

on:
  workflow_call:
    # Make this a reusable workflow, no value needed
    # https://docs.github.com/en/actions/using-workflows/reusing-workflows

jobs:
  check:
    name: Unit Test (${{ matrix.os }}.${{ matrix.node }})
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        # Pinning node 24 to 24.15 to exclude node 24.16 that hangs on unzip wiht pupetteer
        node: ['20', '22', '24.15', '26']
        os: ['ubuntu-latest', 'windows-latest', 'macos-latest']
    runs-on: ${{ matrix.os }}
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🧑‍🔧 Get Core Dependencies
        uses: ./.github/workflows/actions/get-core-dependencies

      - name: 🐢 Setup Node ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Download Build Archive
        uses: ./.github/workflows/actions/download-archive
        with:
          name: webdriverio
          path: .
          filename: webdriverio-build.zip

      - name: Unit Tests
        run: pnpm run test:unit:run
        shell: bash

      - name: Check Git Context
        # currently fails in Windows due to changes to snapshots
        # in packages/wdio-browser-runner/tests/vite/__snapshots__/utils.test.ts.snap
        if: matrix.os != 'windows-latest'
        uses: ./.github/workflows/actions/check-git-context
